<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maklerting Sales Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --border: #2e3149;
    --text: #e8eaf0;
    --text-muted: #7b80a0;
    --accent: #5b6af0;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,.12);
    --erik: #60a5fa;
    --erik-bg: rgba(96,165,250,.08);
    --soufian: #c084fc;
    --soufian-bg: rgba(192,132,252,.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header h1 span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #lastUpdated {
    color: var(--text-muted);
    font-size: 12px;
  }

  #refreshBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity .15s;
  }
  #refreshBtn:hover { opacity: .85; }
  #refreshBtn:disabled { opacity: .5; cursor: not-allowed; }

  #refreshStatus {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    display: none;
  }
  #refreshStatus.ok  { background: var(--green-bg);  color: var(--green);  display: inline; }
  #refreshStatus.err { background: var(--red-bg);    color: var(--red);    display: inline; }

  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* Tab bar */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    transition: all .15s;
    border: none;
    background: transparent;
  }
  .tab.active, .tab:hover { background: var(--surface2); color: var(--text); }
  .tab[data-scope="gesamt"].active { color: var(--text); }
  .tab[data-scope="erik"].active   { color: var(--erik); }
  .tab[data-scope="soufian"].active { color: var(--soufian); }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  /* Section header accent line */
  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
  }
  .section-title.erik    { border-left-color: var(--erik); }
  .section-title.soufian { border-left-color: var(--soufian); }

  /* Absolute numbers row */
  .abs-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .abs-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }

  .abs-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 6px;
  }

  .abs-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .abs-value.euro::after { content: " €"; font-size: 16px; font-weight: 400; color: var(--text-muted); }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.yellow::before { background: var(--yellow); }
  .kpi-card.red::before { background: var(--red); }

  .kpi-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .kpi-card.green  .kpi-value { color: var(--green); }
  .kpi-card.yellow .kpi-value { color: var(--yellow); }
  .kpi-card.red    .kpi-value { color: var(--red); }

  .kpi-badge {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .kpi-card.green  .kpi-badge { background: var(--green-bg);  color: var(--green); }
  .kpi-card.yellow .kpi-badge { background: var(--yellow-bg); color: var(--yellow); }
  .kpi-card.red    .kpi-badge { background: var(--red-bg);    color: var(--red); }

  .kpi-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Error / loading */
  #loadingMsg {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
  }

  #errorMsg {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: none;
  }

  @media (max-width: 640px) {
    .abs-grid { grid-template-columns: repeat(2, 1fr); }
    .kpi-grid  { grid-template-columns: 1fr 1fr; }
    .abs-value { font-size: 22px; }
    .kpi-value { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <h1>Maklerting <span>Sales Dashboard</span></h1>
  <div class="header-right">
    <span id="lastUpdated">Lade Daten…</span>
    <span id="refreshStatus"></span>
    <button id="refreshBtn">&#8635; Aktualisieren</button>
  </div>
</header>

<main>
  <div id="errorMsg"></div>
  <div id="loadingMsg">Daten werden geladen…</div>

  <div id="content" style="display:none">
    <div class="tabs">
      <button class="tab active" data-scope="gesamt">Gesamt</button>
      <button class="tab" data-scope="erik">Erik</button>
      <button class="tab" data-scope="soufian">Soufian</button>
    </div>

    <div class="section active" id="sec-gesamt">
      <div class="section-title">Gesamt — alle Mitarbeiter</div>
      <div class="abs-grid" id="abs-gesamt"></div>
      <div class="kpi-grid" id="kpi-gesamt"></div>
    </div>

    <div class="section" id="sec-erik">
      <div class="section-title erik">Erik</div>
      <div class="abs-grid" id="abs-erik"></div>
      <div class="kpi-grid" id="kpi-erik"></div>
    </div>

    <div class="section" id="sec-soufian">
      <div class="section-title soufian">Soufian</div>
      <div class="abs-grid" id="abs-soufian"></div>
      <div class="kpi-grid" id="kpi-soufian"></div>
    </div>
  </div>
</main>

<script>
// ─── Thresholds & labels ────────────────────────────────────────────────────
const KPI_DEFS = [
  {
    key: 'erreichquote',
    label: 'Erreichquote',
    unit: '%',
    calc: s => pct(s.gf, s.waehlersuche),
    traffic: v => v >= 25 ? 'green' : v >= 15 ? 'yellow' : 'red',
    badge: v => v >= 25 ? 'Stark' : v >= 15 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.gf} GF / ${s.waehlersuche} Versuche`
  },
  {
    key: 'pitchtermin',
    label: 'Pitch → Termin',
    unit: '%',
    calc: s => pct(s.terminiert, s.pitch),
    traffic: v => v >= 25 ? 'green' : v >= 15 ? 'yellow' : 'red',
    badge: v => v >= 25 ? 'Stark' : v >= 15 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.terminiert} Termine / ${s.pitch} Pitches`
  },
  {
    key: 'callsprotermin',
    label: 'Calls pro Termin',
    unit: '',
    calc: s => ratio(s.waehlersuche, s.terminiert),
    traffic: v => v === null ? 'red' : v <= 30 ? 'green' : v <= 50 ? 'yellow' : 'red',
    badge: v => v === null ? 'Flaschenhals' : v <= 30 ? 'Stark' : v <= 50 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.waehlersuche} Calls / ${s.terminiert} Termine`
  },
  {
    key: 'noshow',
    label: 'No-Show Rate',
    unit: '%',
    calc: s => pct(s.noshows, s.quali + s.sales),
    traffic: v => v <= 10 ? 'green' : v <= 25 ? 'yellow' : 'red',
    badge: v => v <= 10 ? 'Stark' : v <= 25 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.noshows} No-Shows / ${s.quali + s.sales} Calls`
  },
  {
    key: 'callabschluss',
    label: 'Call → Abschluss',
    unit: '%',
    calc: s => pct(s.abschluesse, s.waehlersuche),
    traffic: v => v >= 3 ? 'green' : v >= 1 ? 'yellow' : 'red',
    badge: v => v >= 3 ? 'Stark' : v >= 1 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.abschluesse} Abschl. / ${s.waehlersuche} Calls`
  },
  {
    key: 'terminabschluss',
    label: 'Termin → Abschluss',
    unit: '%',
    calc: s => pct(s.abschluesse, s.terminiert),
    traffic: v => v >= 40 ? 'green' : v >= 20 ? 'yellow' : 'red',
    badge: v => v >= 40 ? 'Stark' : v >= 20 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.abschluesse} Abschl. / ${s.terminiert} Termine`
  },
  {
    key: 'termineproabschluss',
    label: 'Termine pro Abschluss',
    unit: '',
    calc: s => ratio(s.terminiert, s.abschluesse),
    traffic: v => v === null ? 'red' : v <= 3 ? 'green' : v <= 6 ? 'yellow' : 'red',
    badge: v => v === null ? 'Flaschenhals' : v <= 3 ? 'Stark' : v <= 6 ? 'Ok' : 'Flaschenhals',
    sub: s => `${s.terminiert} Termine / ${s.abschluesse} Abschl.`
  }
];

// ─── Math helpers ────────────────────────────────────────────────────────────
function sum(rows, field) {
  return rows.reduce((a, r) => a + (r[field] || 0), 0);
}

function pct(num, den) {
  if (!den) return 0;
  return Math.round((num / den) * 1000) / 10; // 1 decimal
}

function ratio(num, den) {
  if (!den) return null;
  return Math.round((num / den) * 10) / 10;
}

function fmt(val, unit) {
  if (val === null) return '–';
  return unit === '%' ? val.toFixed(1) + '%' : String(val);
}

function fmtEuro(v) {
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
}

// ─── Build stats from rows ───────────────────────────────────────────────────
function stats(rows) {
  return {
    waehlersuche: sum(rows, 'waehlersuche'),
    gf:           sum(rows, 'gf'),
    pitch:        sum(rows, 'pitch'),
    terminiert:   sum(rows, 'terminiert'),
    quali:        sum(rows, 'quali'),
    sales:        sum(rows, 'sales'),
    noshows:      sum(rows, 'noshows'),
    abschluesse:  sum(rows, 'abschluesse'),
    umsatz:       sum(rows, 'umsatz')
  };
}

// ─── Render helpers ──────────────────────────────────────────────────────────
function renderAbs(containerId, s) {
  const el = document.getElementById(containerId);
  el.innerHTML = `
    <div class="abs-card">
      <div class="abs-label">Wählversuche</div>
      <div class="abs-value">${s.waehlersuche}</div>
    </div>
    <div class="abs-card">
      <div class="abs-label">Termine</div>
      <div class="abs-value">${s.terminiert}</div>
    </div>
    <div class="abs-card">
      <div class="abs-label">Abschlüsse</div>
      <div class="abs-value">${s.abschluesse}</div>
    </div>
    <div class="abs-card">
      <div class="abs-label">Umsatz</div>
      <div class="abs-value euro">${fmtEuro(s.umsatz)}</div>
    </div>
  `;
}

function renderKPIs(containerId, s) {
  const el = document.getElementById(containerId);
  el.innerHTML = KPI_DEFS.map(def => {
    const val = def.calc(s);
    const color = def.traffic(val);
    const badge = def.badge(val);
    const display = fmt(val, def.unit);
    const sub = def.sub(s);
    return `
      <div class="kpi-card ${color}">
        <div class="kpi-label">${def.label}</div>
        <div class="kpi-value">${display}</div>
        <div class="kpi-badge">${badge}</div>
        <div class="kpi-sub">${sub}</div>
      </div>
    `;
  }).join('');
}

// ─── Load & render ───────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('/api/data');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function render(data) {
  const allRows     = data.rows;
  const erikRows    = allRows.filter(r => r.person === 'Erik');
  const soufianRows = allRows.filter(r => r.person === 'Soufian');

  renderAbs('abs-gesamt',  stats(allRows));
  renderAbs('abs-erik',    stats(erikRows));
  renderAbs('abs-soufian', stats(soufianRows));

  renderKPIs('kpi-gesamt',  stats(allRows));
  renderKPIs('kpi-erik',    stats(erikRows));
  renderKPIs('kpi-soufian', stats(soufianRows));

  document.getElementById('lastUpdated').textContent =
    'Stand: ' + new Date(data.lastUpdated).toLocaleString('de-DE', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }) + ' | ' + allRows.length + ' Einträge';

  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function init() {
  try {
    const data = await loadData();
    render(data);
  } catch (e) {
    document.getElementById('loadingMsg').style.display = 'none';
    const err = document.getElementById('errorMsg');
    err.textContent = 'Fehler beim Laden: ' + e.message + ' — Läuft der Server? (node server.js)';
    err.style.display = 'block';
  }
}

// ─── Refresh button ──────────────────────────────────────────────────────────
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('refreshStatus');
  btn.disabled = true;
  btn.textContent = '⏳ Aktualisiere…';
  status.className = '';
  status.style.display = 'none';

  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    const data = await res.json();

    if (data.refreshed) {
      status.className = 'ok';
      status.textContent = 'Aktualisiert';
    } else {
      status.className = 'err';
      status.textContent = data.refreshError
        ? 'Cache: ' + data.refreshError.slice(0, 60)
        : 'Cache-Daten (kein Update)';
    }

    render(data);
  } catch (e) {
    status.className = 'err';
    status.textContent = 'Fehler: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '↻ Aktualisieren';
});

// ─── Tab switching ───────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.scope).classList.add('active');
  });
});

init();
</script>
</body>
</html>
