name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Mo–Fr um 18:00 Uhr (CET/CEST = UTC+1/+2)
  workflow_dispatch:         # manueller Start per Knopfdruck

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notion-Daten laden
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node refresh.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Keine Änderungen." || (
            git commit -m "data: auto-refresh $(date +%Y-%m-%d)"
            git push
          )
